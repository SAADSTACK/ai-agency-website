<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Two-Factor Authentication — Node and Nexus Ai</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <!-- Toastify CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="/styles.css">
  
  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    .otp-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-dim) 100%);
      padding: 1rem;
    }

    .otp-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 3rem 2rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--outline);
    }

    .otp-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .otp-header .material-symbols-outlined {
      font-size: 3.5rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .otp-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
      margin: 0;
    }

    .otp-header p {
      color: var(--on-surface-variant);
      font-size: 0.95rem;
      margin: 0.5rem 0 0 0;
    }

    .otp-form-group {
      margin-bottom: 1.5rem;
    }

    .otp-form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
    }

    .otp-input-wrapper {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .otp-digit {
      width: 50px;
      height: 50px;
      border: 2px solid var(--outline);
      border-radius: 8px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--on-surface);
      background: var(--surface);
      transition: all 0.2s ease;
    }

    .otp-digit:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 65, 162, 0.1);
    }

    .otp-digit::-webkit-outer-spin-button,
    .otp-digit::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .otp-digit[type=number] {
      -moz-appearance: textfield;
    }

    .otp-error {
      color: var(--error);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1rem;
      display: none;
    }

    .otp-error.show {
      display: block;
    }

    .otp-button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .otp-button {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .otp-button-verify {
      background: var(--primary);
      color: white;
    }

    .otp-button-verify:hover {
      background: #003580;
      box-shadow: 0 4px 12px rgba(0, 65, 162, 0.3);
    }

    .otp-button-back {
      background: var(--surface-variant);
      color: var(--on-surface);
    }

    .otp-button-back:hover {
      background: var(--outline);
    }

    .otp-resend {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--outline-variant);
    }

    .otp-resend p {
      color: var(--on-surface-variant);
      font-size: 0.9rem;
      margin: 0;
    }

    .otp-resend button {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-size: 0.9rem;
      text-decoration: underline;
    }

    .otp-info {
      background: var(--surface-variant);
      border-left: 4px solid var(--primary);
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--on-surface-variant);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 480px) {
      .otp-card {
        padding: 2rem 1.5rem;
      }

      .otp-input-wrapper {
        gap: 0.5rem;
      }

      .otp-digit {
        width: 45px;
        height: 45px;
        font-size: 1.25rem;
      }

      .otp-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="otp-container">
    <div class="otp-card">
      <div class="otp-header">
        <span class="material-symbols-outlined">lock_outline</span>
        <h1>Enter Your Code</h1>
        <p>Enter the 6-digit code from your authenticator app</p>
      </div>

      <div class="otp-info">
        <strong>Two-Factor Authentication Enabled</strong><br/>
        To access your account, verify using your authenticator app (Google Authenticator, Microsoft Authenticator, Authy, etc.)
      </div>

      <form id="otpForm" style="margin-bottom: 0;">
        <div class="otp-form-group">
          <label>Authentication Code</label>
          <div class="otp-input-wrapper">
            <input type="number" class="otp-digit" id="otp1" maxlength="1" min="0" max="9" placeholder="0">
            <input type="number" class="otp-digit" id="otp2" maxlength="1" min="0" max="9" placeholder="0">
            <input type="number" class="otp-digit" id="otp3" maxlength="1" min="0" max="9" placeholder="0">
            <input type="number" class="otp-digit" id="otp4" maxlength="1" min="0" max="9" placeholder="0">
            <input type="number" class="otp-digit" id="otp5" maxlength="1" min="0" max="9" placeholder="0">
            <input type="number" class="otp-digit" id="otp6" maxlength="1" min="0" max="9" placeholder="0">
          </div>
          <div class="otp-error" id="otpError"></div>
        </div>

        <div class="otp-button-group">
          <button type="button" class="otp-button otp-button-back" id="backBtn">Back</button>
          <button type="submit" class="otp-button otp-button-verify" id="verifyBtn">Verify Code</button>
        </div>
      </form>

      <div class="otp-resend">
        <p>Can't access your authenticator app?</p>
        <button id="resendBtn" style="margin-top: 0.5rem;">Use backup code</button>
      </div>
    </div>
  </div>

  <!-- Toastify JS -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <!-- Supabase Auth Scripts -->
  <script src="/js/supabase-client.js"></script>
  <script src="/js/otp-verification.js"></script>
</body>
</html>
